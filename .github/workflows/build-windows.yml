name: Build Windows App

# 로컬 Smart App Control이 Rust 빌드 스크립트 실행을 막기 때문에,
# Tauri 인스톨러(MSI/NSIS)는 SAC가 없는 GitHub 클라우드 러너에서 빌드한다.
# 수동 실행(Actions 탭 → Run workflow) 또는 태그 푸시(v*) 시 동작.

on:
  workflow_dispatch: # Actions 탭에서 수동 실행
  push:
    branches: [master, main] # 푸시 시 자동 빌드
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # 태그 빌드에서 GitHub Release 생성/첨부용
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vitality-nexus/src-tauri

      # ── 백엔드: 의존성 설치 → 스모크 테스트(게이트) → 단일 exe(사이드카) 빌드 ──
      - name: Backend — install, test, build sidecar
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest
          python -m pytest -q
          python scripts/build_sidecar.py
          mkdir -p ../vitality-nexus/src-tauri/binaries
          cp dist/vitality-backend.exe ../vitality-nexus/src-tauri/binaries/vitality-backend-x86_64-pc-windows-msvc.exe

      # ── 프론트엔드 + Tauri 빌드 ──
      - name: Install frontend deps
        run: |
          cd vitality-nexus
          npm ci

      - name: Build Tauri app (MSI + NSIS)
        run: |
          cd vitality-nexus
          npx tauri build --config src-tauri/tauri.ci.conf.json

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: vitality-nexus-windows
          path: |
            vitality-nexus/src-tauri/target/release/bundle/msi/*.msi
            vitality-nexus/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      # ── 태그(v*) 푸시 시: GitHub Release에 인스톨러 자동 첨부 = 공개 다운로드 링크 ──
      # (그동안 산출물이 로그인·90일 만료 게이트된 Actions 아티팩트로만 나가 일반
      #  유저가 받을 경로가 없던 문제 해결. ⚠️ 미서명 인스톨러라 SmartScreen 경고는 별도.)
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vitality-nexus/src-tauri/target/release/bundle/msi/*.msi
            vitality-nexus/src-tauri/target/release/bundle/nsis/*-setup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
